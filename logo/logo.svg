    <!-- 7 Spokes/Handles (Official K8s Style) -->
    <g id="k8s-handles">
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(0)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(51.4)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(102.8)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(154.2)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(205.6)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(257)" />
      <rect x="-12" y="-145" width="24" height="60" rx="12" fill="#326CE5" transform="rotate(308.4)" />
