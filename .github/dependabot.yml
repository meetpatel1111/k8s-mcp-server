version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    vulnerability-alerts:
      enabled: true

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
